  if(state.userName){

  }

  var _defaults={gl:GL_TASKS,ml:ML_TASKS};

    var defMap={};

        st.resources.forEach(function(sr,i){
          if((!sr.url||sr.url.length===0)&&def.resources[i]&&def.resources[i].url&&def.resources[i].url.length>0){
            sr.url=def.resources[i].url;
          }
        });
      }
    });
  });
}
